<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略参数配置 - A股回测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .main-content {
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 30px;
        }

        .left-panel {
            flex-shrink: 0;
        }

        .right-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .parameter-group {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .parameter-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .parameter-item:last-child {
            margin-bottom: 0;
        }

        .parameter-label {
            display: flex;
            flex-direction: column;
        }

        .param-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .param-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.4;
        }

        .parameter-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="range"],
        input[type="number"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="range"] {
            padding: 0;
        }

        input[type="number"] {
            width: 100px;
        }

        .param-value-display {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .param-range {
            font-size: 11px;
            color: #999;
            min-width: 150px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #f5222d;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-info {
            background: #1890ff;
            color: white;
        }

        .btn-info:hover {
            background: #096dd9;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }

        .message.active {
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .message.warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #ff9800;
        }

        .preset-section {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .preset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .preset-header h3 {
            font-size: 14px;
            color: #333;
        }

        .preset-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .preset-item {
            background: white;
            border: 1px solid #bbdefb;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .preset-item:hover {
            background: #bbdefb;
        }

        .preset-name {
            flex: 1;
            margin-right: 5px;
        }

        .preset-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #2196f3;
            font-size: 12px;
            padding: 2px 5px;
        }

        .preset-btn:hover {
            color: #1976d2;
        }

        .preset-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preset-input-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #bbdefb;
            border-radius: 4px;
            font-size: 12px;
        }

        .preset-input-group button {
            padding: 8px 15px;
            font-size: 12px;
        }

        .info-box {
            background: #f5f5f5;
            border-left: 4px solid #666;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .comparison {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .comparison-box {
            background: #fafafa;
            border-radius: 6px;
            padding: 15px;
        }

        .comparison-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-item {
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .comparison-label {
            color: #999;
        }

        .comparison-value {
            font-weight: bold;
            color: #333;
        }

        @media (max-width: 768px) {
            .parameter-item {
                grid-template-columns: 1fr;
            }

            .parameter-input {
                flex-direction: column;
            }

            input[type="number"] {
                width: 100%;
            }

            .comparison {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 策略参数配置</h1>
            <p>自定义回测策略参数 - 实时调整，秒级回测</p>
        </div>

        <div class="content">
            <div class="main-content">
                <!-- 左侧面板：参数配置 -->
                <div class="left-panel">
                    <!-- 策略选择区 -->
                    <div class="section">
                        <div class="section-title">🎯 策略选择</div>

                        <div class="parameter-group">
                            <div class="parameter-item">
                                <div class="parameter-label">
                                    <div class="param-name">回测策略</div>
                                    <div class="param-desc">选择要配置的回测策略</div>
                                </div>
                                <div class="parameter-input">
                                    <select id="strategySelect" onchange="switchStrategy()"
                                            style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                                        <option value="">加载中...</option>
                                    </select>
                                </div>
                            </div>

                            <div id="strategyDescription" style="background: #f0f7ff; padding: 12px; border-radius: 6px; font-size: 13px; color: #666; margin-top: 10px;">
                                请选择策略
                            </div>
                        </div>
                    </div>

                    <!-- 参数配置区 -->
                    <div class="section">
                        <div class="section-title">📊 策略参数</div>

                        <div class="parameter-group" id="parametersContainer">
                            <!-- 动态生成参数输入 -->
                        </div>

                        <div class="button-group">
                            <button class="btn-primary" onclick="saveParameters()">💾 保存参数</button>
                            <button class="btn-secondary" onclick="resetToDefault()">🔄 恢复默认</button>
                            <button class="btn-info" onclick="reloadPage()">🔃 刷新页面</button>
                            <button class="btn-secondary" onclick="goBackToBacktest()">🏠 返回回测</button>
                        </div>

                        <div id="paramMessage" class="message"></div>
                    </div>

                    <!-- 参数对比区 -->
                    <div class="section">
                        <div class="section-title">📈 参数对比</div>

                        <div class="comparison">
                            <div class="comparison-box">
                                <div class="comparison-title">当前参数</div>
                                <div id="currentParams"></div>
                            </div>

                            <div class="comparison-box">
                                <div class="comparison-title">默认参数</div>
                                <div id="defaultParams"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 预设管理区 -->
                    <div class="section">
                        <div class="section-title">💾 参数预设</div>

                        <div class="preset-section">
                            <div class="preset-header">
                                <h3>🎯 保存的预设</h3>
                                <span id="presetCount" style="font-size: 12px; color: #999;"></span>
                            </div>

                            <div class="preset-list" id="presetList">
                                <!-- 动态生成预设列表 -->
                            </div>

                            <div class="preset-input-group">
                                <input type="text" id="presetName" placeholder="输入预设名称">
                                <button class="btn-info" onclick="savePreset()">💾 保存当前为预设</button>
                            </div>

                            <div id="presetMessage" class="message"></div>
                        </div>
                    </div>

                    <!-- 提示信息 -->
                    <div class="info-box">
                        <strong>💡 使用提示：</strong><br>
                        • 参数修改后点击"保存参数"按钮<br>
                        • 修改后的参数会立即应用到回测<br>
                        • 可以保存常用的参数组合为预设<br>
                        • 点击预设名称快速加载预设<br>
                        • 拖动滑块或直接输入数字修改参数
                    </div>
                </div>

                <!-- 右侧面板：信号扫描 -->
                <div class="right-panel">
                    <div class="section-title">🔍 信号扫描</div>

                    <!-- 日期范围 + 搜索 -->
                    <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:center; margin-bottom:12px;">
                        <div>
                            <div style="font-size:11px; color:#999; margin-bottom:3px;">开始日期</div>
                            <input type="date" id="signalStartDate"
                                   style="width:100%; padding:7px 8px; border:1px solid #ddd; border-radius:6px; font-size:13px;">
                        </div>
                        <div>
                            <div style="font-size:11px; color:#999; margin-bottom:3px;">结束日期</div>
                            <input type="date" id="signalEndDate"
                                   style="width:100%; padding:7px 8px; border:1px solid #ddd; border-radius:6px; font-size:13px;">
                        </div>
                        <button id="signalScanBtn" onclick="runSignalScan()"
                                style="padding:8px 16px; background:#1976d2; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; align-self:flex-end; margin-bottom:0;">
                            搜索
                        </button>
                    </div>

                    <!-- 状态/提示信息 -->
                    <div id="signalScanMsg" style="font-size:12px; color:#999; margin-bottom:8px;"></div>

                    <!-- 结果列表 -->
                    <div id="signalResultList"></div>
                </div>
            </div>
        </div>

    <script>
        // 使用window对象确保全局可访问
        window.currentParams = {};
        window.defaultParams = {};
        window.currentStrategy = '';
        window.allStrategies = [];
        window.cachedKLineData = null;  // retained for compatibility

        // 页面加载时获取参数
        window.addEventListener('load', async () => {
            await loadStrategies();
            await loadParameterInfo();
            renderParameters();
            renderComparison();
            loadPresets();

        });

        // 加载所有策略列表
        async function loadStrategies() {
            try {
                const response = await fetch('/api/strategies');
                const result = response.json ? await response.json() : JSON.parse(response.data);

                if (result.success) {
                    window.allStrategies = result.strategies;
                    window.currentStrategy = result.current_strategy;

                    // 填充下拉框
                    const select = document.getElementById('strategySelect');
                    select.innerHTML = '';

                    result.strategies.forEach(strategy => {
                        const option = document.createElement('option');
                        option.value = strategy.key;
                        option.textContent = strategy.name;
                        if (strategy.key === window.currentStrategy) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });

                    // 显示当前策略描述
                    updateStrategyDescription();
                } else {
                    showMessage('paramMessage', '加载策略失败: ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('paramMessage', '加载策略错误: ' + error.message, 'error');
                console.error('加载策略异常:', error);
            }
        }

        // 更新策略描述
        function updateStrategyDescription() {
            const strategy = window.allStrategies.find(s => s.key === window.currentStrategy);
            if (strategy) {
                document.getElementById('strategyDescription').innerHTML =
                    `<strong>${strategy.name}</strong><br>${strategy.description}`;
            }
        }

        // 切换策略
        async function switchStrategy() {
            const select = document.getElementById('strategySelect');
            const newStrategy = select.value;

            if (newStrategy === window.currentStrategy) {
                return;
            }

            if (!confirm(`确定切换到策略: ${select.options[select.selectedIndex].text}？`)) {
                select.value = window.currentStrategy;
                return;
            }

            try {
                showMessage('paramMessage', '正在切换策略...', 'warning');

                const response = await fetch('/api/strategies/current', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({strategy: newStrategy})
                });

                const result = await response.json();

                if (result.success) {
                    window.currentStrategy = newStrategy;
                    updateStrategyDescription();

                    // 重新加载参数
                    await loadParameterInfo();
                    renderParameters();
                    renderComparison();

                    showMessage('paramMessage', result.message, 'success');
                } else {
                    showMessage('paramMessage', result.error || '切换失败', 'error');
                    select.value = window.currentStrategy;
                }
            } catch (error) {
                showMessage('paramMessage', '切换策略失败: ' + error.message, 'error');
                select.value = window.currentStrategy;
            }
        }

        // 加载参数信息
        async function loadParameterInfo() {
            try {
                const response = await fetch('/api/parameters');
                const result = await response.json();

                if (result.success) {
                    const info = result.data;
                    window.currentParams = info.current_params;
                    window.defaultParams = info.default_params;
                } else {
                    showMessage('paramMessage', '加载参数失败: ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('paramMessage', '网络错误: ' + error.message, 'error');
            }
        }

        // 渲染参数输入
        function renderParameters() {
            const container = document.getElementById('parametersContainer');

            // 为所有可能的参数定义范围和描述
            const ranges = {
                // 原有策略参数
                'ma_period': {min: 5, max: 250, step: 1},
                'volume_multiplier': {min: 0.5, max: 10, step: 0.1},
                'retest_period': {min: 3, max: 20, step: 1},
                'hold_days': {min: 1, max: 10, step: 1},
                'recent_days': {min: 1, max: 20, step: 1},
                'turnover_min': {min: 0.01, max: 1000, step: 1},
                'turnover_max': {min: 0.01, max: 1000, step: 1},

                // 稳健型趋势策略参数
                'ma_short': {min: 5, max: 100, step: 1},
                'ma_long': {min: 10, max: 200, step: 1},
                'ma_filter': {min: 20, max: 300, step: 1},
                'volume_ma': {min: 5, max: 50, step: 1},
                'macd_fast': {min: 5, max: 20, step: 1},
                'macd_slow': {min: 15, max: 50, step: 1},
                'macd_signal': {min: 5, max: 20, step: 1},
                'stop_loss': {min: 0.01, max: 0.5, step: 0.01},
                'take_profit': {min: 0.05, max: 0.5, step: 0.05},
                'trailing_stop': {min: 0.01, max: 0.2, step: 0.01},
                'position_size': {min: 0.01, max: 1, step: 0.05},

                // 激进型动量策略参数
                'breakout_period': {min: 5, max: 50, step: 1},
                'breakout_threshold': {min: 0.01, max: 0.2, step: 0.01},
                'rsi_period': {min: 2, max: 20, step: 1},
                'rsi_threshold': {min: 30, max: 70, step: 5},
                'kdj_n': {min: 2, max: 20, step: 1},
                'kdj_m1': {min: 1, max: 10, step: 1},
                'kdj_m2': {min: 1, max: 10, step: 1},
                'atr_period': {min: 5, max: 30, step: 1},
                'atr_stop_mult': {min: 0.5, max: 5, step: 0.5},
                'max_hold_days': {min: 0, max: 60, step: 1},

                // 平衡型多因子策略参数
                'boll_period': {min: 10, max: 50, step: 1},
                'boll_std': {min: 0.5, max: 4, step: 0.5},
                'rsi_oversold': {min: 10, max: 50, step: 5},
                'rsi_overbought': {min: 50, max: 90, step: 5},
                'take_profit_1': {min: 0.02, max: 0.2, step: 0.01},
                'take_profit_2': {min: 0.05, max: 0.3, step: 0.01},
                'take_profit_final': {min: 0.1, max: 0.5, step: 0.05},
                'factor_weight_boll': {min: 0, max: 1, step: 0.05},
                'factor_weight_rsi': {min: 0, max: 1, step: 0.05},
                'factor_weight_macd': {min: 0, max: 1, step: 0.05},
                'factor_weight_volume': {min: 0, max: 1, step: 0.05},
                'factor_weight_price': {min: 0, max: 1, step: 0.05},
                'min_factor_score': {min: 0.3, max: 1, step: 0.05}
            };

            const descriptions = {
                // 原有策略
                'ma_period': '30日均线周期（天），用于判断上升趋势',
                'volume_multiplier': '量能倍数，最近3日总量能 vs 20日均量能 * 倍数',
                'retest_period': '5日线周期（天），用于检测价格回踩',
                'hold_days': '持有天数（交易日），买入后N天卖出',
                'recent_days': '参考值',
                'turnover_min': '上一交易日成交金额最小值（亿元），低于此值不交易',
                'turnover_max': '上一交易日成交金额最大值（亿元），超过此值不交易',

                // 稳健型趋势策略
                'ma_short': '短期均线周期',
                'ma_long': '长期均线周期',
                'ma_filter': '趋势滤波均线周期',
                'volume_ma': '成交量均线周期',
                'macd_fast': 'MACD快线周期',
                'macd_slow': 'MACD慢线周期',
                'macd_signal': 'MACD信号线周期',
                'stop_loss': '单笔止损幅度（如 0.10 = 10%），亏损超过此幅度自动平仓，网格策略默认10%',
                'take_profit': '止盈幅度比例',
                'trailing_stop': '移动止盈幅度比例',
                'position_size': '单次仓位大小',

                // 激进型动量策略
                'breakout_period': '突破周期（天）',
                'breakout_threshold': '突破幅度阈值',
                'rsi_period': 'RSI计算周期',
                'rsi_threshold': 'RSI强势线（>表示强势）',
                'kdj_n': 'KDJ计算周期',
                'kdj_m1': 'KDJ平滑参数1',
                'kdj_m2': 'KDJ平滑参数2',
                'atr_period': 'ATR计算周期',
                'atr_stop_mult': 'ATR止损倍数',
                'max_hold_days': '最大持仓交易日数（0=不限制）；持仓满此天数后，下一交易日强制卖出（优先于止损止盈）',

                // 平衡型多因子策略
                'boll_period': '布林带周期',
                'boll_std': '布林带标准差倍数',
                'rsi_oversold': 'RSI超卖线',
                'rsi_overbought': 'RSI超买线',
                'take_profit_1': '第一批止盈幅度',
                'take_profit_2': '第二批止盈幅度',
                'take_profit_final': '最终止盈幅度',
                'factor_weight_boll': '布林带因子权重',
                'factor_weight_rsi': 'RSI因子权重',
                'factor_weight_macd': 'MACD因子权重',
                'factor_weight_volume': '成交量因子权重',
                'factor_weight_price': '价格因子权重',
                'min_factor_score': '最低因子评分阈值'
            };

            container.innerHTML = '';

            for (const [key, value] of Object.entries(window.currentParams)) {
                const range = ranges[key] || {min: 0, max: 100, step: 1};
                const desc = descriptions[key] || key;

                const html = `
                    <div class="parameter-item">
                        <div class="parameter-label">
                            <div class="param-name">${key}</div>
                            <div class="param-desc">${desc}</div>
                        </div>
                        <div class="parameter-input">
                            <input type="range" id="range_${key}"
                                   min="${range.min}" max="${range.max}" step="${range.step}"
                                   value="${value}" onchange="updateValue('${key}')" oninput="updateValue('${key}')">
                            <input type="number" id="number_${key}"
                                   min="${range.min}" max="${range.max}" step="${range.step}"
                                   value="${value}" onchange="updateValue('${key}')" oninput="updateValue('${key}')">
                            <div class="param-value-display" id="display_${key}">${value}</div>
                            <div class="param-range">${range.min} ~ ${range.max}</div>
                        </div>
                    </div>
                `;

                container.innerHTML += html;
            }
        }

        // 更新参数值
        function updateValue(paramName) {
            const rangeInput = document.getElementById(`range_${paramName}`);
            const numberInput = document.getElementById(`number_${paramName}`);
            const display = document.getElementById(`display_${paramName}`);

            // 同步两个输入框
            let value = rangeInput.value;
            numberInput.value = value;

            window.currentParams[paramName] = parseFloat(value);
            display.textContent = value;

            // (图表实时更新已移除，改用信号扫描功能)
        }

        // 保存参数
        async function saveParameters() {
            try {
                const response = await fetch('/api/parameters/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({params: window.currentParams})
                });

                const result = await response.json();

                if (result.success) {
                    window.currentParams = result.new_params;
                    renderComparison();
                    showMessage('paramMessage', '✓ 参数已保存，将应用到下次回测', 'success');
                } else {
                    showMessage('paramMessage', '✗ ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('paramMessage', '✗ 网络错误: ' + error.message, 'error');
            }
        }

        // 恢复默认
        async function resetToDefault() {
            if (!confirm('确定要恢复为默认参数吗?')) return;

            try {
                const response = await fetch('/api/parameters/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });

                const result = await response.json();

                if (result.success) {
                    window.currentParams = result.new_params;
                    renderParameters();
                    renderComparison();
                    showMessage('paramMessage', '✓ 已恢复为默认参数', 'success');
                } else {
                    showMessage('paramMessage', '✗ ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('paramMessage', '✗ 网络错误: ' + error.message, 'error');
            }
        }

        // 渲染参数对比
        function renderComparison() {
            const currentHTML = Object.entries(window.currentParams).map(([key, value]) => `
                <div class="comparison-item">
                    <span class="comparison-label">${key}</span>
                    <span class="comparison-value">${value}</span>
                </div>
            `).join('');

            const defaultHTML = Object.entries(window.defaultParams).map(([key, value]) => `
                <div class="comparison-item">
                    <span class="comparison-label">${key}</span>
                    <span class="comparison-value">${value}</span>
                </div>
            `).join('');

            document.getElementById('currentParams').innerHTML = currentHTML;
            document.getElementById('defaultParams').innerHTML = defaultHTML;
        }

        // 保存预设
        async function savePreset() {
            const presetName = document.getElementById('presetName').value.trim();

            if (!presetName) {
                showMessage('presetMessage', '✗ 请输入预设名称', 'error');
                return;
            }

            try {
                const response = await fetch('/api/parameters/preset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'save',
                        name: presetName
                    })
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('presetName').value = '';
                    loadPresets();
                    showMessage('presetMessage', result.message, 'success');
                } else {
                    showMessage('presetMessage', '✗ ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('presetMessage', '✗ 网络错误: ' + error.message, 'error');
            }
        }

        // 加载预设列表
        async function loadPresets() {
            try {
                const response = await fetch('/api/parameters/preset');
                const result = await response.json();

                if (result.success) {
                    const presets = result.presets;
                    const presetList = document.getElementById('presetList');

                    if (Object.keys(presets).length === 0) {
                        presetList.innerHTML = '<p style="color: #999; font-size: 12px;">暂无预设</p>';
                        document.getElementById('presetCount').textContent = '0个预设';
                    } else {
                        presetList.innerHTML = Object.keys(presets).map(name => `
                            <div class="preset-item">
                                <span class="preset-name" onclick="loadPreset('${name}')" title="点击加载">${name}</span>
                                <button class="preset-btn" onclick="deletePreset('${name}')" title="删除">✕</button>
                            </div>
                        `).join('');
                        document.getElementById('presetCount').textContent = Object.keys(presets).length + '个预设';
                    }
                }
            } catch (error) {
                console.error('加载预设失败:', error);
            }
        }

        // 加载预设
        async function loadPreset(presetName) {
            try {
                const response = await fetch('/api/parameters/preset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'load',
                        name: presetName
                    })
                });

                const result = await response.json();

                if (result.success) {
                    window.currentParams = result.new_params;
                    renderParameters();
                    renderComparison();
                    showMessage('presetMessage', result.message, 'success');
                } else {
                    showMessage('presetMessage', '✗ ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('presetMessage', '✗ 网络错误: ' + error.message, 'error');
            }
        }

        // 删除预设
        async function deletePreset(presetName) {
            if (!confirm(`确定要删除预设 "${presetName}" 吗?`)) return;

            try {
                const response = await fetch('/api/parameters/preset', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: presetName})
                });

                const result = await response.json();

                if (result.success) {
                    loadPresets();
                    showMessage('presetMessage', result.message, 'success');
                } else {
                    showMessage('presetMessage', '✗ ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('presetMessage', '✗ 网络错误: ' + error.message, 'error');
            }
        }

        // 显示消息
        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `message active ${type}`;

            setTimeout(() => {
                el.classList.remove('active');
            }, 5000);
        }

        // 刷新页面
        function reloadPage() {
            location.reload();
        }

        // 返回回测页面
        function goBackToBacktest() {
            window.location.href = '/';
        }

        // ==================== 信号扫描功能 ====================

        // 设置默认日期为今天
        (function() {
            const today = new Date().toISOString().slice(0, 10);
            document.addEventListener('DOMContentLoaded', () => {
                const s = document.getElementById('signalStartDate');
                const e = document.getElementById('signalEndDate');
                if (s) s.value = today;
                if (e) e.value = today;
            });
        })();

        async function runSignalScan() {
            const today = new Date().toISOString().slice(0, 10);
            const startDate = (document.getElementById('signalStartDate') || {}).value || today;
            const endDate   = (document.getElementById('signalEndDate')   || {}).value || today;
            const msg = document.getElementById('signalScanMsg');
            const list = document.getElementById('signalResultList');
            const btn = document.getElementById('signalScanBtn');

            msg.textContent = '扫描中，请稍候...';
            msg.style.color = '#ff9800';
            list.innerHTML = '';
            btn.disabled = true;

            try {
                // 获取当前策略 key 和参数
                const stratRes = await fetch('/api/strategies/current');
                const stratData = await stratRes.json();
                const strategyKey = stratData.current_strategy || null;

                const paramsRes = await fetch(`/api/strategies/${strategyKey}/params`);
                const paramsData = await paramsRes.json();
                const params = paramsData.params || {};

                const res = await fetch('/api/signals/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start_date: startDate, end_date: endDate, strategy_key: strategyKey, params })
                });
                const data = await res.json();

                if (!data.success) {
                    msg.textContent = '扫描失败: ' + (data.error || '未知错误');
                    msg.style.color = '#f44336';
                    return;
                }

                const { matched, total_scanned, strategy_name, stocks } = data;
                const rangeStr = startDate === endDate ? startDate : `${startDate} ~ ${endDate}`;
                msg.textContent = `${rangeStr} · ${strategy_name} · 扫描 ${total_scanned} 只，命中 ${matched} 只`;
                msg.style.color = '#4caf50';

                if (!stocks || stocks.length === 0) {
                    list.innerHTML = '<p style="color:#999;font-size:13px;text-align:center;padding:16px 0;">该日期范围内没有符合条件的股票</p>';
                    return;
                }

                list.innerHTML = stocks.map(s => {
                    const chg = parseFloat(s.change_pct || 0);
                    const chgColor = chg > 0 ? '#f44336' : chg < 0 ? '#4caf50' : '#666';
                    const chgStr = (chg > 0 ? '+' : '') + chg.toFixed(2) + '%';
                    const sigDate = s.date || startDate;
                    return `
                    <div onclick="openKlineModal('${s.symbol}', '${sigDate}')"
                         style="display:flex; align-items:center; justify-content:space-between;
                                padding:10px 14px; border:1px solid #e8e8e8; border-radius:6px;
                                margin-bottom:6px; cursor:pointer; background:#fafafa; transition:background 0.15s;"
                         onmouseover="this.style.background='#f0f7ff'"
                         onmouseout="this.style.background='#fafafa'">
                        <div>
                            <span style="font-weight:bold; font-size:14px;">${s.symbol}</span>
                            <span style="font-size:11px; color:#1976d2; margin-left:8px; background:#e3f2fd; padding:1px 5px; border-radius:3px;">${sigDate}</span>
                            ${s.ma5 ? `<span style="font-size:11px; color:#999; margin-left:6px;">MA5: ${s.ma5}</span>` : ''}
                            ${s.ma30 ? `<span style="font-size:11px; color:#999; margin-left:6px;">MA30: ${s.ma30}</span>` : ''}
                        </div>
                        <div style="text-align:right;">
                            <span style="font-size:15px; font-weight:bold;">${s.close}</span>
                            <span style="font-size:12px; color:${chgColor}; margin-left:6px;">${chgStr}</span>
                        </div>
                    </div>`;
                }).join('');

            } catch(e) {
                msg.textContent = '网络错误: ' + e.message;
                msg.style.color = '#f44336';
            } finally {
                btn.disabled = false;
            }
        }

        // ── K线弹窗 ────────────────────────────────────────────────────────────────

        let _klineChartInstance = null;

        async function openKlineModal(symbol, date) {
            const modal = document.getElementById('klineModal');
            document.getElementById('klineModalTitle').textContent = `${symbol}  信号日期: ${date}`;
            modal.style.display = 'flex';
            document.getElementById('klineChart').innerHTML = '<p style="text-align:center;padding:40px 0;color:#999;">加载中...</p>';

            try {
                const res = await fetch(`/api/signals/kline/${symbol}?date=${date}&days=10`);
                const data = await res.json();
                if (!data.success || !data.kline) throw new Error(data.error || '无数据');
                renderKlineChart(data.kline, data.signal_date);
            } catch(e) {
                document.getElementById('klineChart').innerHTML = `<p style="text-align:center;padding:40px 0;color:#f44336;">加载失败: ${e.message}</p>`;
            }
        }

        function closeKlineModal() {
            document.getElementById('klineModal').style.display = 'none';
            if (_klineChartInstance) { _klineChartInstance.dispose(); _klineChartInstance = null; }
        }

        function renderKlineChart(kline, signalDate) {
            const container = document.getElementById('klineChart');
            container.innerHTML = '';
            if (_klineChartInstance) { _klineChartInstance.dispose(); }
            _klineChartInstance = echarts.init(container);

            const dates   = kline.map(d => d.date);
            const ohlc    = kline.map(d => [d.open, d.close, d.low, d.high]);
            const volumes = kline.map(d => d.volume);

            // 标记信号日
            const markData = kline
                .map((d, i) => d.is_signal ? { xAxis: i, name: '买入信号' } : null)
                .filter(Boolean);

            const option = {
                backgroundColor: '#fff',
                grid: [
                    { left: 50, right: 20, top: 20, bottom: 100 },
                    { left: 50, right: 20, top: '72%', bottom: 30 }
                ],
                xAxis: [
                    { type: 'category', data: dates, gridIndex: 0, axisLabel: { fontSize: 10 },
                      axisLine: { onZero: false } },
                    { type: 'category', data: dates, gridIndex: 1, axisLabel: { show: false } }
                ],
                yAxis: [
                    { scale: true, gridIndex: 0, axisLabel: { fontSize: 10 }, splitNumber: 4 },
                    { scale: true, gridIndex: 1, axisLabel: { show: false }, splitNumber: 2 }
                ],
                series: [
                    {
                        type: 'candlestick',
                        xAxisIndex: 0, yAxisIndex: 0,
                        data: ohlc,
                        itemStyle: {
                            color: '#f44336', color0: '#4caf50',
                            borderColor: '#f44336', borderColor0: '#4caf50'
                        },
                        markLine: markData.length ? {
                            silent: true,
                            data: markData.map(m => [
                                { xAxis: m.xAxis, yAxis: 'min', symbol: 'none' },
                                { xAxis: m.xAxis, yAxis: 'max', symbol: 'none',
                                  lineStyle: { color: '#1976d2', type: 'dashed', width: 1.5 },
                                  label: { formatter: '买入信号', position: 'end', fontSize: 10, color: '#1976d2' }
                                }
                            ])
                        } : undefined
                    },
                    {
                        type: 'bar',
                        xAxisIndex: 1, yAxisIndex: 1,
                        data: volumes,
                        itemStyle: {
                            color: (params) => kline[params.dataIndex].close >= kline[params.dataIndex].open ? '#f44336' : '#4caf50'
                        }
                    }
                ],
                tooltip: {
                    trigger: 'axis', axisPointer: { type: 'cross' },
                    formatter: (params) => {
                        const c = params[0];
                        if (!c) return '';
                        const d = kline[c.dataIndex];
                        return `${d.date}<br/>开:${d.open} 收:${d.close}<br/>高:${d.high} 低:${d.low}<br/>量:${d.volume.toLocaleString()}`;
                    }
                },
                dataZoom: [{ type: 'inside', xAxisIndex: [0, 1] }]
            };
            _klineChartInstance.setOption(option);
        }
    </script>
